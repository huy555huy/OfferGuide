<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=380">
<title>OfferGuide Boss 助手</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 380px; min-height: 200px;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    font-size: 13px; color: #333; padding: 12px;
  }
  h1 { font-size: 15px; margin-bottom: 8px; }
  .status { padding: 6px 8px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; }
  .status.info  { background: #e8f4fd; color: #1a73e8; }
  .status.ok    { background: #e6f4ea; color: #137333; }
  .status.err   { background: #fce8e6; color: #c5221f; }
  .status.warn  { background: #fef7e0; color: #b06000; }
  .field { margin-bottom: 6px; }
  .field label { font-weight: 600; display: block; font-size: 11px; color: #666; margin-bottom: 2px; }
  .field .val { padding: 4px 6px; background: #f8f8f8; border-radius: 3px; min-height: 20px;
    max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; font-size: 12px; }
  .actions { margin-top: 10px; display: flex; gap: 8px; }
  button {
    flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer;
    font-size: 13px; font-weight: 500;
  }
  #btn-send { background: #1a73e8; color: #fff; }
  #btn-send:hover { background: #1557b0; }
  #btn-send:disabled { background: #ccc; cursor: not-allowed; }
  #btn-refresh { background: #f1f3f4; color: #333; }
  .hidden { display: none; }
</style>
</head>
<body>
  <h1>OfferGuide Boss 助手</h1>
  <div id="status" class="status info">检测中…</div>

  <div id="fields" class="hidden">
    <div class="field"><label>岗位</label><div class="val" id="f-title"></div></div>
    <div class="field"><label>公司</label><div class="val" id="f-company"></div></div>
    <div class="field"><label>薪资</label><div class="val" id="f-salary"></div></div>
    <div class="field"><label>地点</label><div class="val" id="f-location"></div></div>
    <div class="field"><label>描述 (前 300 字)</label><div class="val" id="f-desc"></div></div>
    <div class="field"><label>标签</label><div class="val" id="f-tags"></div></div>
  </div>

  <div class="actions">
    <button id="btn-refresh">重新提取</button>
    <button id="btn-send" disabled>发送到 OfferGuide</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
