<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>{% block title %}OfferGuide{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        /* ─────── design tokens (Claude-inspired warm palette) ─────── */
        :root {
            --bg:           #faf8f5;   /* warm cream off-white */
            --bg-elev:      #ffffff;
            --bg-subtle:    #f3efe5;   /* slightly warmer cream */
            --bg-warm:      #ede8dc;   /* warm accent surface */
            --border:       #e8e1d2;
            --border-soft:  #efeae0;
            --text:         #2c2925;   /* warm dark, not pure black */
            --text-muted:   #79716a;
            --text-dim:     #a39e95;

            --primary:      #cc785c;   /* terracotta */
            --primary-soft: #fbf0e8;
            --primary-hover:#b85f44;

            --success:      #6b8e6b;   /* sage */
            --success-soft: #e8efe6;
            --warning:      #c89456;   /* amber-warm */
            --warning-soft: #f6ecd8;
            --danger:       #b84a44;   /* warm rose */
            --danger-soft:  #f4e2df;

            --radius:       8px;
            --radius-sm:    6px;
            --radius-lg:    14px;
            --shadow-sm:    0 1px 2px rgba(44, 41, 37, 0.04);
            --shadow-md:    0 4px 14px rgba(44, 41, 37, 0.06);
            --shadow-lg:    0 12px 28px rgba(44, 41, 37, 0.08);

            --font-sans:    -apple-system, BlinkMacSystemFont, "Inter",
                            "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
            --font-serif:   "Source Serif 4", "Tiempos Headline", "Georgia", serif;
            --font-mono:    "SF Mono", "JetBrains Mono", "Menlo", monospace;
        }

        /* ─────── reset / base ─────── */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        code, kbd, pre { font-family: var(--font-mono); font-size: 0.9em; }
        h1, h2, h3, h4 { line-height: 1.3; }

        /* ─────── header / nav ─────── */
        .topbar {
            background: var(--bg-elev);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar .brand {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 1.15rem;
            letter-spacing: -0.015em;
            margin-right: 2rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .topbar .brand .dot {
            width: 8px; height: 8px; border-radius: 999px;
            background: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        .topbar nav {
            display: flex; gap: 0.25rem;
        }
        .topbar nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.12s;
            white-space: nowrap;
        }
        .topbar nav a:hover { background: var(--bg-subtle); color: var(--text); }
        .topbar nav a.active {
            background: var(--primary-soft);
            color: var(--primary-hover);
            font-weight: 600;
        }

        /* 「更多」折叠下拉菜单 */
        .nav-more {
            position: relative;
        }
        .nav-more summary {
            list-style: none; cursor: pointer; user-select: none;
            color: var(--text-muted);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-flex; align-items: center; gap: 0.25rem;
        }
        .nav-more summary::-webkit-details-marker { display: none; }
        .nav-more summary::after {
            content: "▾";
            font-size: 0.7rem;
            opacity: 0.6;
            transition: transform 0.15s;
        }
        .nav-more[open] summary::after { transform: rotate(180deg); }
        .nav-more summary:hover { background: var(--bg-subtle); color: var(--text); }
        .nav-more[open] summary {
            background: var(--bg-subtle); color: var(--text);
        }
        .nav-more-panel {
            position: absolute; top: calc(100% + 4px); right: 0;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            min-width: 160px;
            padding: 0.375rem;
            z-index: 100;
            display: flex; flex-direction: column; gap: 0.125rem;
        }
        .nav-more-panel a {
            padding: 0.4rem 0.75rem;
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .nav-more-panel a:hover {
            background: var(--bg-subtle);
            text-decoration: none;
        }
        .nav-more-panel a.active {
            background: var(--primary-soft);
            color: var(--primary-hover);
        }

        .status-strip {
            margin-left: auto;
            font-size: 0.8rem;
            display: flex; align-items: center; gap: 0.5rem;
            color: var(--text-muted);
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 999px;
            background: var(--success);
        }
        .status-dot.warn { background: var(--warning); }

        /* ─────── layout ─────── */
        main {
            max-width: 1080px;
            margin: 1.75rem auto 4rem;
            padding: 0 1.5rem;
        }
        .page-title {
            display: flex; justify-content: space-between; align-items: baseline;
            margin: 0 0 1.25rem;
        }
        .page-title h1 {
            margin: 0;
            font-family: var(--font-serif);
            font-size: 1.85rem; font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--text);
        }
        .page-title p {
            margin: 0.375rem 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 700px;
        }

        /* ─────── cards ─────── */
        .card {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-sm);
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin: -0.25rem 0 1rem;
        }
        .card-header h2 {
            margin: 0;
            font-family: var(--font-serif);
            font-size: 1.1rem; font-weight: 600;
            letter-spacing: -0.015em;
        }
        .card-header .meta { color: var(--text-muted); font-size: 0.8rem; }

        /* ─────── stats strip ─────── */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .stat {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.875rem 1rem;
        }
        .stat .label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
        .stat .value {
            font-family: var(--font-serif);
            font-size: 1.85rem; font-weight: 600;
            margin-top: 0.375rem;
            letter-spacing: -0.025em;
            color: var(--text);
            line-height: 1;
        }
        .stat .delta { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.375rem; }

        /* ─────── forms ─────── */
        textarea, input[type="text"], select {
            width: 100%;
            font-family: inherit; font-size: 0.9rem;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-elev);
            color: var(--text);
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        textarea:focus, input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        textarea { resize: vertical; min-height: 9rem; line-height: 1.55; }
        label.field { display: block; }
        label.field .label-text {
            display: block;
            font-size: 0.8rem; font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
        }

        /* ─────── radios as button-group ─────── */
        .seg {
            display: inline-flex;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-elev);
            overflow: hidden;
        }
        .seg label {
            padding: 0.4rem 0.85rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            border-right: 1px solid var(--border);
            white-space: nowrap;
            transition: all 0.12s;
        }
        .seg label:last-child { border-right: none; }
        .seg label:hover { background: var(--bg-subtle); }
        .seg input[type="radio"] { display: none; }
        .seg input[type="radio"]:checked + span {
            background: var(--text);
            color: var(--bg-elev);
            margin: -0.4rem -0.85rem;
            padding: 0.4rem 0.85rem;
            display: inline-block;
        }

        /* ─────── buttons ─────── */
        button, .btn {
            padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500;
            cursor: pointer;
            background: var(--primary); color: white; border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            transition: background 0.12s, transform 0.06s;
        }
        button:hover, .btn:hover { background: var(--primary-hover); }
        button:active, .btn:active { transform: translateY(1px); }
        button:disabled, .btn:disabled {
            opacity: 0.5; cursor: not-allowed;
        }
        button.secondary, .btn.secondary {
            background: var(--bg-elev); color: var(--text);
            border: 1px solid var(--border);
        }
        button.secondary:hover { background: var(--bg-subtle); }
        button.ghost, .btn.ghost {
            background: transparent; color: var(--text-muted);
            border: 1px solid transparent;
            padding: 0.35rem 0.625rem; font-size: 0.8rem;
        }
        button.ghost:hover { background: var(--bg-subtle); color: var(--text); }
        button.success { background: var(--success); }
        button.warning { background: var(--warning); }
        button.danger  { background: var(--danger); }

        .actions { display: flex; gap: 0.625rem; align-items: center; flex-wrap: wrap; }

        /* ─────── pills / badges ─────── */
        .pill {
            display: inline-flex; align-items: center;
            padding: 0.125rem 0.5rem; border-radius: 999px;
            font-size: 0.7rem; font-weight: 500;
            background: var(--bg-subtle); color: var(--text-muted);
            border: 1px solid var(--border-soft);
        }
        .pill.high     { background: var(--danger-soft);  color: var(--danger); }
        .pill.medium   { background: var(--warning-soft); color: var(--warning); }
        .pill.low      { background: var(--success-soft); color: var(--success); }
        .pill.pending  { background: var(--warning-soft); color: var(--warning); }
        .pill.approved { background: var(--success-soft); color: var(--success); }
        .pill.rejected { background: var(--danger-soft);  color: var(--danger); }
        .pill.dismissed{ background: var(--bg-subtle);    color: var(--text-muted); }
        .pill.primary  { background: var(--primary-soft); color: var(--primary); }
        .pill.fit      { background: var(--success-soft); color: var(--success); }
        .pill.misfit   { background: var(--danger-soft);  color: var(--danger); }
        .pill.middle   { background: var(--bg-subtle);    color: var(--text); }

        /* ─────── prob bar ─────── */
        .prob-card {
            display: flex; gap: 1.5rem; align-items: center;
            padding: 1rem; background: var(--bg-subtle);
            border-radius: var(--radius); margin-bottom: 1rem;
        }
        .prob-num {
            font-family: var(--font-serif);
            font-size: 2.85rem; font-weight: 600;
            letter-spacing: -0.04em; line-height: 1;
            color: var(--primary);
        }
        .prob-bar {
            flex: 1; height: 8px; background: var(--border-soft);
            border-radius: 999px; position: relative; overflow: hidden;
        }
        .prob-fill {
            position: absolute; left: 0; top: 0; bottom: 0;
            background: linear-gradient(90deg, var(--danger), var(--warning), var(--success));
            border-radius: 999px;
        }
        .prob-marker {
            position: absolute; top: -3px; bottom: -3px; width: 2px;
            background: var(--text);
        }
        .dim-list { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .dim {
            background: var(--bg-elev); border: 1px solid var(--border);
            padding: 0.25rem 0.625rem; border-radius: var(--radius-sm);
            font-size: 0.75rem; display: inline-flex; gap: 0.375rem;
        }
        .dim .name { color: var(--text-muted); }
        .dim .val  { font-weight: 600; }

        /* ─────── suggestion cards ─────── */
        .suggestion {
            border: 1px solid var(--border);
            border-left: 3px solid var(--text-muted);
            border-radius: var(--radius-sm);
            padding: 0.75rem 0.875rem; margin-bottom: 0.625rem;
            background: var(--bg-elev);
        }
        .suggestion.high { border-left-color: var(--danger); }
        .suggestion.medium { border-left-color: var(--warning); }
        .suggestion.low { border-left-color: var(--success); }
        .suggestion .head {
            display: flex; gap: 0.5rem; align-items: center;
            font-size: 0.8rem; color: var(--text-muted);
            margin-bottom: 0.375rem;
        }
        .suggestion .head .section { color: var(--text); font-weight: 600; font-size: 0.875rem; }
        .suggestion .body { font-size: 0.875rem; }
        .suggestion .body .quote {
            background: var(--primary-soft); color: var(--text);
            padding: 0.25rem 0.5rem; border-radius: var(--radius-sm);
            display: inline-block; margin-top: 0.25rem;
        }
        .suggestion .reason {
            font-size: 0.78rem; color: var(--text-muted);
            margin-top: 0.375rem;
        }

        /* ─────── question cards ─────── */
        .question {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 0.875rem; margin-bottom: 0.5rem;
            background: var(--bg-elev);
        }
        .question .top {
            display: flex; gap: 0.5rem; align-items: center;
            margin-bottom: 0.375rem; font-size: 0.78rem;
        }
        .question .top .lik {
            margin-left: auto; font-family: var(--font-mono);
            font-weight: 600; color: var(--text);
        }
        .question .q { font-size: 0.9rem; font-weight: 500; line-height: 1.5; }
        .question .why {
            font-size: 0.78rem; color: var(--text-muted);
            margin-top: 0.375rem;
        }

        .cat-technical          { background: var(--primary-soft);  color: var(--primary); }
        .cat-behavioral         { background: var(--success-soft);  color: var(--success); }
        .cat-system_design      { background: #f3e8ff; color: #7e22ce; }
        .cat-company_specific   { background: var(--warning-soft);  color: var(--warning); }
        .cat-project_deep_dive  { background: #fce7f3; color: #be185d; }

        /* ─────── inbox ─────── */
        .inbox-row {
            display: grid;
            grid-template-columns: 50px 1fr 110px 110px auto;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-soft);
        }
        .inbox-row:last-child { border-bottom: none; }
        .inbox-row .id-col { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem; }
        .inbox-row .title-col { font-weight: 500; }
        .inbox-row .actions { gap: 0.25rem; }

        /* ─────── helpers ─────── */
        .muted { color: var(--text-muted); font-size: 0.85rem; }
        .small { font-size: 0.78rem; }
        .dim-text { color: var(--text-dim); }
        .error {
            color: var(--danger);
            padding: 0.75rem 1rem;
            background: var(--danger-soft);
            border: 1px solid var(--danger);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
        }
        .empty {
            text-align: center; padding: 2rem 1rem;
            color: var(--text-muted);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }
        .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }

        section + section { margin-top: 0.75rem; }
        .section-title {
            font-size: 0.85rem; font-weight: 600;
            margin: 0.75rem 0 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ─────── progress / metric bar ─────── */
        .metric-row {
            display: grid; grid-template-columns: 110px 1fr 60px;
            gap: 0.5rem; align-items: center; margin: 0.25rem 0;
            font-size: 0.8rem;
        }
        .metric-row .name { color: var(--text-muted); }
        .metric-row .bar {
            height: 6px; background: var(--bg-subtle); border-radius: 999px;
            position: relative; overflow: hidden;
        }
        .metric-row .bar > div {
            height: 100%; background: var(--primary); border-radius: 999px;
        }
        .metric-row .val { font-family: var(--font-mono); text-align: right; }

        /* ─────── responsive ─────── */
        @media (max-width: 720px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .topbar nav a { padding: 0.35rem 0.6rem; }
            .inbox-row { grid-template-columns: 1fr; }
            main { padding: 0 1rem; margin-top: 1rem; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand"><span class="dot"></span> OfferGuide</div>
        <nav>
            <a href="/"             class="{% if active_tab == 'home' %}active{% endif %}">今日</a>
            <a href="/pipeline"     class="{% if active_tab == 'pipeline' %}active{% endif %}">投递看板</a>
            <a href="/quick-eval"   class="{% if active_tab == 'quick_eval' %}active{% endif %}">评估</a>
            <a href="/applications" class="{% if active_tab == 'applications' %}active{% endif %}">投递记录</a>
            <details class="nav-more">
                <summary>更多</summary>
                <div class="nav-more-panel">
                    <a href="/tailor"     class="{% if active_tab == 'tailor' %}active{% endif %}">简历微调</a>
                    <a href="/mock"       class="{% if active_tab == 'mock' %}active{% endif %}">模拟面试</a>
                    <a href="/compare"    class="{% if active_tab == 'compare' %}active{% endif %}">岗位对比</a>
                    <a href="/interviews" class="{% if active_tab == 'interviews' %}active{% endif %}">面经库</a>
                    <a href="/stories"    class="{% if active_tab == 'stories' %}active{% endif %}">故事库</a>
                    <a href="/reflect"    class="{% if active_tab == 'reflect' %}active{% endif %}">面试复盘</a>
                    <a href="/inbox"      class="{% if active_tab == 'inbox' %}active{% endif %}">待办收件箱</a>
                    <a href="/dashboard"  class="{% if active_tab == 'dashboard' %}active{% endif %}">系统状态</a>
                </div>
            </details>
        </nav>
        <div class="status-strip">
            {% if profile_loaded %}
                <span class="status-dot"></span>
                <span>简历已加载 · {{ profile_chars }} 字</span>
            {% else %}
                <span class="status-dot warn"></span>
                <span>未加载简历 — 设 <code>OFFERGUIDE_RESUME_PDF</code></span>
            {% endif %}
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
