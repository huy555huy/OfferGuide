<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>{% block title %}OfferGuide{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", sans-serif;
            margin: 0; padding: 0;
            background: #fafaf9;
            color: #1c1917;
            line-height: 1.55;
        }
        header {
            background: #1c1917;
            color: #fafaf9;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
        header nav a {
            color: #fafaf9; text-decoration: none; opacity: 0.7;
            border-bottom: 2px solid transparent; padding-bottom: 2px;
        }
        header nav a:hover { opacity: 1; border-bottom-color: #fafaf9; }
        header .profile-status { margin-left: auto; font-size: 0.85rem; opacity: 0.65; }

        main { max-width: 980px; margin: 2rem auto; padding: 0 1.5rem; }

        .card {
            background: white;
            border: 1px solid #e7e5e4;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 { margin-top: 0; font-size: 1rem; font-weight: 600; }

        textarea, input[type="text"] {
            width: 100%;
            font-family: inherit; font-size: 0.95rem;
            padding: 0.75rem;
            border: 1px solid #d6d3d1; border-radius: 6px;
            background: white;
        }
        textarea { resize: vertical; min-height: 8rem; }

        .actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
        button, .btn {
            padding: 0.5rem 1rem; font-size: 0.9rem; cursor: pointer;
            background: #1c1917; color: white; border: none; border-radius: 6px;
        }
        button:hover { background: #44403c; }
        button.secondary { background: white; color: #1c1917; border: 1px solid #d6d3d1; }
        button.warn     { background: #b45309; }
        button.danger   { background: #b91c1c; }

        .pill {
            display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px;
            font-size: 0.75rem; background: #e7e5e4;
        }
        .pill.high { background: #fee2e2; color: #b91c1c; }
        .pill.medium { background: #fef3c7; color: #b45309; }
        .pill.low { background: #d1fae5; color: #065f46; }
        .pill.pending { background: #fef9c3; }
        .pill.approved { background: #d1fae5; color: #065f46; }
        .pill.rejected { background: #fee2e2; color: #b91c1c; }
        .pill.dismissed { background: #e7e5e4; }

        pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; }
        .report { background: #fafaf9; padding: 1rem; border-radius: 6px; }
        .report h2, .report h3 { margin: 1rem 0 0.5rem; }
        .muted { color: #78716c; font-size: 0.85rem; }
        .error { color: #b91c1c; padding: 0.5rem; background: #fee2e2; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <h1>OfferGuide</h1>
        <nav>
            <a href="/">Chat</a>
            <a href="/inbox">Inbox</a>
        </nav>
        <span class="profile-status">
            {% if profile_loaded %}
                简历已加载 ({{ profile_chars }} 字)
            {% else %}
                ⚠ 未加载简历 — 设 OFFERGUIDE_RESUME_PDF
            {% endif %}
        </span>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
