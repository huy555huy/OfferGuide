{% if items %}
<table style="width:100%; border-collapse: collapse;">
    <thead>
        <tr style="text-align:left; border-bottom:1px solid #e7e5e4;">
            <th style="padding:0.5rem 0.5rem 0.5rem 0;">#</th>
            <th>标题</th>
            <th>类型</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
    {% for it in items %}
        <tr style="border-bottom:1px solid #f5f5f4;" id="inbox-row-{{ it.id }}">
            <td style="padding:0.5rem 0.5rem 0.5rem 0;">{{ it.id }}</td>
            <td>{{ it.title }}</td>
            <td><span class="pill">{{ it.kind }}</span></td>
            <td><span class="pill {{ it.status }}">{{ it.status }}</span></td>
            <td>
                {% if it.status == "pending" %}
                <form hx-post="/inbox/{{ it.id }}/decide"
                      hx-target="#inbox-row-{{ it.id }}" hx-swap="outerHTML" style="display:inline">
                    <button name="decision" value="approved" class="secondary">approve</button>
                    <button name="decision" value="rejected" class="secondary">reject</button>
                    <button name="decision" value="dismissed" class="secondary">dismiss</button>
                </form>
                {% else %}
                <span class="muted">{{ it.decision_note or "—" }}</span>
                {% endif %}
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p class="muted">暂无 inbox 项。</p>
{% endif %}
